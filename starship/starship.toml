# Shared by zsh and fish.
# Two-line prompt: directory + git + language versions, then a clean arrow.
# Replaces spaceship-prompt.

format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$line_break\
$character\
"""

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[✗](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
ahead = "↑${count}"
behind = "↓${count}"
diverged = "↑${ahead_count}↓${behind_count}"
untracked = "?"
modified = "!"
staged = "+"
deleted = "✘"
stashed = "$"
style = "bold red"

[python]
symbol = " "
format = "[$symbol$version]($style) "
style = "bold green"

[nodejs]
symbol = " "
format = "[$symbol$version]($style) "
style = "bold green"
