# espanso match file

# For a complete introduction, visit the official docs at: https://espanso.org/docs/

# You can use this file to define the base matches (aka snippets)
# that will be available in every application when using espanso.
# Hi there!
# Matches are substitution rules: when you type the "trigger" string
# it gets replaced by the "replace" string.
matches:
  # Simple text replacement
  - trigger: ":espanso"
    replace: "Hi there!"

  # URLs
  - trigger: "ffhqi"
    replace: "https://github.com/mitodl/hq/issues/ "
  - trigger: "ffhqd"
    replace: "https://github.com/mitodl/hq/discussions/ "
  - trigger: "ffstudio"
    replace: "https://github.com/mitodl/ocw-studio/pulls/ "
  - trigger: "fflearn"
    replace: "https://github.com/mitodl/mit-learn/pulls/ "
  - trigger: "ffmitx"
    replace: "https://github.com/mitodl/mitxonline/pulls/ "
  - trigger: "ffsmoot"
    replace: "https://github.com/mitodl/smoot-design/pulls/ "
  - trigger: "ff3d"
    replace: "https://github.com/christopherchudzicki/math3d-next/pulls/ "
  - trigger: "ffoldjango"
    replace: "https://github.com/mitodl/ol-django/pulls/ "
  - trigger: "ffinfra"
    replace: "https://github.com/mitodl/ol-infrastructure/pulls/ "
  - trigger: "fflai"
    replace: "https://github.com/mitodl/learn-ai/pulls/ "
  - trigger: "ff5eapi"
    replace: "https://github.com/open5e/open5e-api "
  - trigger: "mdnote"
    replace: |-
      <!-- Github supports: NOTE, TIP, IMPORTANT, WARNING, CAUTION -->
      > [!NOTE]
      > hello
  # Print the current date
  - trigger: ":date"
    replace: "{{mydate}}"
    vars:
      - name: mydate
        type: date
        params:
          format: "%m/%d/%Y"

  # Print the output of a shell command
  - trigger: ":shell"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "echo 'Hello from your shell'"

  # And much more! For more information, visit the docs: https://espanso.org/docs/
